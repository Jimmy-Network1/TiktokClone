name: G4 - Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build (debug/release)'
        required: true
        default: release
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m -XX:MaxMetaspaceSize=512m
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            android/build.gradle
            android/app/build.gradle
            android/settings.gradle
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Android NDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "y" | ${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" --sdk_root=${SDK_ROOT}
          echo "NDK installed"

      - name: Determine build type
        id: build_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=release" >> $GITHUB_OUTPUT
          fi

      - name: Verify debug keystore
        run: |
          if [ ! -f "android/app/debug.keystore" ]; then
            echo "Generating debug keystore..."
            keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "Debug keystore OK"

      - name: Build APK (${{ steps.build_type.outputs.type }})
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble$(echo "${{ steps.build_type.outputs.type }}" | sed 's/.*/\u&/') --no-daemon

      - name: Rename APK
        run: |
          TYPE=${{ steps.build_type.outputs.type }}
          APK_DIR="android/app/build/outputs/apk/$TYPE"
          # Find the first APK (app-release.apk, app-debug.apk, etc.)
          APK_FILE=$(ls $APK_DIR/*.apk 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "$APK_DIR/G4-Final.apk"
            echo "APK renamed to G4-Final.apk in $APK_DIR"
          else
            echo "No APK found in $APK_DIR"
            ls -la "$APK_DIR/" 2>/dev/null || echo "Directory does not exist"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: G4-${{ steps.build_type.outputs.type == 'release' && 'Release' || 'Debug' }}-APK
          path: android/app/build/outputs/apk/**/G4-Final.apk
          compression-level: 0
          if-no-files-found: error
