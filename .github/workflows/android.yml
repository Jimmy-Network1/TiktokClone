name: G4 - Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build (debug/release/both)'
        required: true
        default: both
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation script
        run: node scripts/validate.js

  build-android:
    needs: validate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m -XX:MaxMetaspaceSize=512m
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            android/build.gradle
            android/app/build.gradle
            android/settings.gradle
            android/gradle/wrapper/gradle-wrapper.properties

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Android NDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "y" | ${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" --sdk_root=${SDK_ROOT}
          echo "NDK installed"

      - name: Determine build types
        id: build_types
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BT="${{ github.event.inputs.build_type }}"
          else
            BT="both"
          fi
          echo "type=$BT" >> $GITHUB_OUTPUT

      - name: Verify debug keystore
        run: |
          if [ ! -f "android/app/debug.keystore" ]; then
            echo "Generating debug keystore..."
            keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "Debug keystore OK"

      - name: Build Debug APK
        if: steps.build_types.outputs.type == 'debug' || steps.build_types.outputs.type == 'both'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: steps.build_types.outputs.type == 'release' || steps.build_types.outputs.type == 'both'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          # Debug APK
          if ls android/app/build/outputs/apk/debug/*.apk 2>/dev/null; then
            cp $(ls android/app/build/outputs/apk/debug/*.apk | head -1) android/app/build/outputs/apk/debug/G4-Debug.apk
            echo "Debug APK renamed"
          fi
          # Release APK
          if ls android/app/build/outputs/apk/release/*.apk 2>/dev/null; then
            cp $(ls android/app/build/outputs/apk/release/*.apk | head -1) android/app/build/outputs/apk/release/G4-Release.apk
            echo "Release APK renamed"
          fi

      - name: Upload APK(s)
        uses: actions/upload-artifact@v4
        with:
          name: G4-APKs
          path: |
            android/app/build/outputs/apk/debug/G4-Debug.apk
            android/app/build/outputs/apk/release/G4-Release.apk
          compression-level: 0
          if-no-files-found: warn
