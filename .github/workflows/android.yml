name: G4 - Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build (debug/release)'
        required: true
        default: release
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m -XX:MaxMetaspaceSize=512m
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            android/build.gradle
            android/app/build.gradle
            android/settings.gradle
            android/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine build type
        id: build_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=release" >> $GITHUB_OUTPUT
          fi

      - name: Build APK (${{ steps.build_type.outputs.type }})
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble$(echo "${{ steps.build_type.outputs.type }}" | sed 's/.*/\u&/')

      - name: Rename Release APK
        if: steps.build_type.outputs.type == 'release'
        run: |
          # Copier l'APK signé (avec le debug.keystore) vers un nom stable
          APK_DIR="android/app/build/outputs/apk/release"
          cp $APK_DIR/*.apk $APK_DIR/G4-Final.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: G4-${{ steps.build_type.outputs.type == 'release' && 'Release' || 'Debug' }}-APK
          path: |
            android/app/build/outputs/apk/release/G4-Final.apk
            android/app/build/outputs/apk/debug/*.apk
          compression-level: 0
          if-no-files-found: error
